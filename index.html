<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشروع الفيزياء التفاعلي</title>
    <style>
        /* تنسيق عام للموقع مريح للعين ومناسب للجوال */
        body {
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        h1, h2, p {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #4fc3f7;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        /* حاوية مرنة وذكية للفيديو والتجربة تناسب الوضع الطولي للجوال */
        .responsive-container {
            position: relative;
            padding-bottom: 56.25%; /* أبعاد 16:9 الافتراضية للكمبيوتر */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            background-color: #000;
            border: 2px solid #4fc3f7;
        }

        .responsive-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
			object-fit: cover;
        }

        /* ضبط ذكي وخاص بالجوال بالوضع الطولي */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            h1 {
                font-size: 1.6rem;
            }
            p {
                font-size: 1rem;
            }
            .responsive-container {
                /* زيادة نسبة الارتفاع على الشاشات الطولية لتظهر التجربة والفيديو بشكل أوضح وأكبر */
                padding-bottom: 75%; 
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <h1>مشروع الفيزياء التفاعلي</h1>
        <p>شاهد العرض المرئي بالأسفل، ثم انتقل لتطبيق التجربة التفاعلية بنفسك.</p>

        <h2>أولاً: العرض المرئي (الفيديو)</h2>

        <div class="responsive-container">
            <iframe src="https://drive.google.com/file/d/معرف_فيديو_جوجل_درايف/preview" 
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
        allowfullscreen>
		</iframe>
        </div>

        <h2>ثانياً: المختبر التفاعلي (PhET Simulation)</h2>
        <p>💡 يمكنك الآن التحكم في الكتل، النوابض، والسرعة مباشرة من خلال المختبر المدمج أدناه:</p>
        <div class="responsive-container">
            <iframe src="phet-simulation.html" allowfullscreen></iframe>
        </div>

    </div>

</body>
</html>
